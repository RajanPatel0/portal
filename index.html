<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKGPTU Placement | IKG. Punjab Technical University</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="assets/images/icons/logo/ptu-logo.png" alt="PTU Logo" class="main-logo">
            <div class="accreditation">NAAC A++</div>
        </div>
        <ul class="nav-links">
            <li><a href="#">About</a></li>
            <li><a href="pages/student/login.html">Students</a></li>
            <li><a href="pages/recruiter/login.html">Recruiters</a></li>
            <li><a href="#">Placements</a></li>
            <li class="apply-btn"><a href="#">Login Now →</a></li>
        </ul>
    </nav>

    <section class="hero-section">
        <div class="hero-overlay">
            <div class="hero-content">
                <h2 class="sub-heading">Where Ambition Meets Opportunity</h2>
                <h1 class="main-heading">IKG-PTU Final Year students getting <br><span>Highest Packages</span></h1>
                
                <div class="package-stats">
                    <div class="stat-box">
                        <span class="currency">₹</span><span class="amount">54.75</span><span class="label">LAKH<br>PACKAGE</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-box">
                        <span class="currency">₹</span><span class="amount">20+</span><span class="label">LAKH<br>AVG PACKAGE</span>
                    </div>
                </div>

                <p class="hero-desc">2000+ PTU students selected at packages of ₹10 Lakh - ₹50 Lakh*</p>
                <div class="cta-container">
                    <button class="btn-main">EXPLORE PLACEMENTS</button>
                </div>
            </div>
            
            <div class="hero-visual">
                <img src="assets/images/placement/hero-student.png" alt="Top Placed Student">
            </div>
        </div>
    </section>

</body>
</html>
