<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="assets/images/logo/ikgptu-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKGPTU Placements | Recruiters, Internships & Career Opportunities</title>
    
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="navbar-load"></div>

    <section class="hero-section">
        <div class="hero-overlay">
            <div class="hero-content">
                <h2 class="sub-heading">Where Ambition Meets Opportunity</h2>
                <h1 class="main-heading">IKG-PTU Final Year students getting <br><span>Highest Packages</span></h1>
                
                <div class="package-stats">
                    <div class="stat-box">
                        <span class="currency">₹</span><span class="amount">54.75</span><span class="label">LAKH<br>PACKAGE</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-box">
                        <span class="currency">₹</span><span class="amount">20+</span><span class="label">LAKH<br>AVG PACKAGE</span>
                    </div>
                </div>
                <div class="cta-container">
                    <button class="btn-main">EXPLORE PLACEMENTS</button>
                </div>
            </div>
            <div class="hero-visual">
                <img src="assets/images/placement/hero-student.png" alt="Top Placed Student">
            </div>
          </div>

          <p class="hero-desc">
            2000+ PTU students selected at packages of ₹10 Lakh - ₹50 Lakh*
          </p>
          <div class="cta-container">
            <button class="btn-main">EXPLORE PLACEMENTS</button>
          </div>
        </div>

        <div class="hero-visual">
          <img
            src="assets/images/placement/hero-student.png"
            alt="Top Placed Student"
          />
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div>

    <script>
        // 1. Load the Navbar
        fetch('components/navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-load').innerHTML = data;
                
                // 2. Initialize Hamburger Logic ONLY after navbar is loaded
                const hamburger = document.getElementById("hamburger");
                const navMenu = document.getElementById("nav-menu");

                if (hamburger && navMenu) {
                    hamburger.addEventListener("click", function() {
                        hamburger.classList.toggle("active");
                        navMenu.classList.toggle("active");
                    });
                }
            })
            .catch(err => console.error("Failed to load navbar:", err));
    </script>

    <script>
      fetch("components/footer.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("footer-placeholder").innerHTML = data;
        });
    </script>
</body>
</html>
