<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="assets/images/logo/ikgptu-logo.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      IKGPTU Placements | Recruiters, Internships & Career Opportunities
    </title>

    <link rel="stylesheet" href="assets/css/main.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/testimonials.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="navbar-load"></div>

    <div id="hero-section"></div>

    <div id="stat-section"></div>

    <div id="recruiters-section"></div>

    <div id="notices-load"></div>

    <div id="latest-placements-load"></div>

    <div id="testimonial-section"></div>

    <div id="faq-section"></div>

    <div id="footer-placeholder"></div>

    <script>
      // 1. Load the Navbar
      fetch("components/navbar.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("navbar-load").innerHTML = data;

          // 2. Initialize Hamburger Logic ONLY after navbar is loaded
          const hamburger = document.getElementById("hamburger");
          const navMenu = document.getElementById("nav-menu");

          if (hamburger && navMenu) {
            hamburger.addEventListener("click", function () {
              hamburger.classList.toggle("active");
              navMenu.classList.toggle("active");
            });
          }
        })
        .catch((err) => console.error("Failed to load navbar:", err));
    </script>

    <script>
      fetch("components/hero.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("hero-section").innerHTML = data;
        });
    </script>

    <script>
      // Load the Stats Banner Component
      fetch("components/stat.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("stat-section").innerHTML = data;
        });
    </script>

    <script>
        fetch('components/companies.html')
      .then(response => response.text())
      .then(data => {
          document.getElementById('recruiters-section').innerHTML = data;
      });
    </script>
    
    <script>
        // Append this to your existing component loading logic
        fetch('components/notices.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('notices-load').innerHTML = data;
                // Standard modal initialization can go here if needed
            })
            .catch(err => console.error("Failed to load notices section:", err));

        /* =========================================
        Modal (Opening Window) Trigger Logic
        ========================================= */
        function openModal(type) {
            const modal = document.getElementById('noticeModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Prevent scrolling main page

            if (type === 'announcements') {
                title.textContent = 'All Placement Announcements';
                // In a real backend, you would use PHP/PHP-Backend to fetch and load all present records here.
                body.innerHTML = '<p> php backend integrated later can load all present announcements here with standard cards structure.</p>';
            } else {
                title.textContent = 'All News & Notices';
                // In a real backend, you would use PHP/PHP-Backend to fetch and load all present notices here.
                body.innerHTML = '<p> php backend integrated later can load all present news updates and notices here.</p>';
            }
        }

        function closeModal() {
            const modal = document.getElementById('noticeModal');
            modal.classList.add('hidden');
            document.body.style.overflow = ''; // Restore scrolling
        }

        // Close modal when clicking outside the window
        document.getElementById('noticeModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>

    <script>
      fetch("components/testimonials.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("testimonial-section").innerHTML = data;
          initTestimonials();
        });
    </script>

    <script>
      // Component Loader
        fetch('components/latestPlacement.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('latest-placements-load').innerHTML = data;
                initPlacementSlider(); // Initialize the slider logic after loading
            });

        // Simple Slider Logic
        function initPlacementSlider() {
            const track = document.getElementById('placements-track');
            const next = document.getElementById('placement-next');
            const prev = document.getElementById('placement-prev');
            let index = 0;

            next.addEventListener('click', () => {
                const cardWidth = document.querySelector('.placement-card').offsetWidth + 30;
                const max = track.children.length - (window.innerWidth > 1024 ? 3 : 1);
                if (index < max) {
                    index++;
                    track.style.transform = `translateX(-${index * cardWidth}px)`;
                }
            });

            prev.addEventListener('click', () => {
                const cardWidth = document.querySelector('.placement-card').offsetWidth + 30;
                if (index > 0) {
                    index--;
                    track.style.transform = `translateX(-${index * cardWidth}px)`;
                }
            });
        }
    </script>

    <script>
        // 1. Fetch the FAQ component
        fetch("components/faq.html")
          .then((response) => response.text())
          .then((data) => {
            // 2. Inject the HTML into the container
            const container = document.getElementById("faq-section");
            container.innerHTML = data;

            // 3. Initialize the Accordion logic ONLY after data is loaded
            initFaqAccordion();
          })
          .catch(err => console.error("Error loading FAQ:", err));

        function initFaqAccordion() {
          const faqItems = document.querySelectorAll('.faq-item');

          faqItems.forEach(item => {
            const question = item.querySelector('.faq-question');
            
            question.addEventListener('click', () => {
              // Check if current item is already active
              const isActive = item.classList.contains('active');

              // Close all other items (Accordion effect)
              faqItems.forEach(otherItem => {
                otherItem.classList.remove('active');
              });

              // Toggle the clicked item (if it wasn't active, open it)
              if (!isActive) {
                item.classList.add('active');
              }
            });
          });
        }
      </script>

    <script>
  // 1. Fetch the Footer
  fetch("components/footer.html")
    .then((response) => response.text())
    .then((data) => {
      // 2. Inject the HTML
      document.getElementById("footer-placeholder").innerHTML = data;

      // 3. IMPORTANT: Initialize the accordion logic ONLY after the HTML is injected
      initFooterAccordion();
    })
    .catch(err => console.error("Error loading footer:", err));

  // Footer Mobile Accordion Logic
  function initFooterAccordion() {
    // We select toggles here because they now exist in the DOM
    const toggles = document.querySelectorAll('.footer-toggle');
    
    if (toggles.length > 0) {
      toggles.forEach(toggle => {
        toggle.addEventListener('click', () => {
          // Check if we are on mobile view
          if (window.innerWidth <= 768) {
            const parent = toggle.parentElement;
            
            // Close other accordion columns
            document.querySelectorAll('.accordion-col').forEach(col => {
              if (col !== parent) col.classList.remove('active');
            });

            // Toggle the clicked one
            parent.classList.toggle('active');
          }
        });
      });
    }
  }

  // Handle window resizing (Optional but professional)
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      // Remove active classes if user rotates phone to landscape/desktop
      document.querySelectorAll('.accordion-col').forEach(col => {
        col.classList.remove('active');
      });
    }
  });
</script>

    <script src="assets/js/hero-slider.js"></script>

    <script src="assets/js/testimonials.js"></script>
  </body>
</html>
